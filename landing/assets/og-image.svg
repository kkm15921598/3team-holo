<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbe7ff"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- 로고 마크 -->
  <g transform="translate(100, 100)">
    <rect width="72" height="72" rx="20" fill="rgba(255,255,255,0.95)"/>
    <circle cx="36" cy="36" r="18" fill="url(#bg)"/>
  </g>
  <text x="190" y="158" font-family="Pretendard, system-ui, sans-serif"
        font-weight="800" font-size="56" fill="white" letter-spacing="-1">HOLO</text>

  <!-- 메인 카피 -->
  <text x="100" y="320" font-family="Pretendard, system-ui, sans-serif"
        font-weight="800" font-size="80" fill="url(#text)" letter-spacing="-2">
    혼자여도,
  </text>
  <text x="100" y="420" font-family="Pretendard, system-ui, sans-serif"
        font-weight="800" font-size="80" fill="url(#text)" letter-spacing="-2">
    가까운 동네와 연결되다
  </text>

  <!-- 보조 카피 -->
  <text x="100" y="500" font-family="Pretendard, system-ui, sans-serif"
        font-weight="500" font-size="28" fill="rgba(255,255,255,0.85)">
    2030 1인 가구를 위한 지역 커뮤니티
  </text>

  <!-- 우하단 데코: 마이룸 가구 이모지 -->
  <g transform="translate(900, 380)" opacity="0.9">
    <circle cx="100" cy="100" r="120" fill="rgba(255,255,255,0.12)"/>
    <text x="40" y="120" font-size="80">🏠</text>
    <text x="130" y="80" font-size="40">🌿</text>
    <text x="150" y="160" font-size="40">💜</text>
  </g>
</svg>
