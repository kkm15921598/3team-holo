<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 친구추가</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* ══════════════════════════
     Background: My Friends screen
  ══════════════════════════ */
  .bg-screen {
    position: absolute;
    inset: 0;
    background: #fff;
  }

  /* Header */
  .bg-header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 54px 20px 12px;
    background: #fff;
  }

  .logo-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 32px; font-weight: 600;
    color: #7448DD; letter-spacing: 1px; line-height: 1;
  }

  .bg-hdr-icons { display: flex; align-items: center; gap: 16px; }
  .bg-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #1A1A1A; position: relative; }
  .notif-dot { position: absolute; top: 0; right: 0; width: 7px; height: 7px; background: #FF4343; border-radius: 50%; border: 1.5px solid #fff; }

  /* Title bar */
  .bg-title-bar {
    position: absolute; top: 110px; left: 0; right: 0;
    padding: 0 20px 14px;
    border-bottom: 1px solid #D9D9D9;
    display: flex; align-items: center; background: #fff;
  }

  .bg-back { background: none; border: none; padding: 2px; margin-right: 8px; display: flex; align-items: center; }
  .bg-title { font-size: 20px; font-weight: 700; color: #000; flex: 1; }
  .bg-title-actions { display: flex; align-items: center; gap: 14px; }
  .bg-action-btn { background: none; border: none; display: flex; align-items: center; padding: 2px; }

  /* Friends info row */
  .bg-info-row {
    position: absolute; top: 158px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
  }
  .bg-info-left { display: flex; align-items: center; gap: 6px; font-size: 16px; color: #000; }
  .bg-info-right { font-size: 16px; color: #000; }

  /* Friend Grid */
  .bg-friend-grid {
    position: absolute; top: 216px; left: 0; right: 0;
    display: grid; grid-template-columns: 1fr 1fr;
    padding: 0 10px;
  }

  .bg-friend-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 10px;
  }

  .bg-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    overflow: hidden; flex-shrink: 0;
  }

  .bg-friend-name { font-size: 14px; color: #404040; }

  /* More btn */
  .bg-more {
    position: absolute; top: 430px; left: 0; right: 0;
    display: flex; justify-content: center;
    font-size: 15px; color: #555;
  }

  /* Bottom menus */
  .bg-menus {
    position: absolute; top: 480px; left: 20px; right: 20px;
  }
  .bg-menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 0; font-size: 16px; color: #000;
  }

  /* Bottom Nav */
  .bg-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: #fff;
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start; padding-top: 10px;
  }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #A8A8A8; }
  .nav-tab.active .nav-icon { color: #7448DD; }
  .nav-label { font-size: 12px; font-weight: 400; color: #A8A8A8; }
  .nav-tab.active .nav-label { font-weight: 700; color: #7448DD; }

  /* ══════════════════════════
     Overlay Layer
  ══════════════════════════ */

  /* DIM */
  .dim {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* Top bar (above dim) */
  .overlay-topbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    background: #fff;
    z-index: 20;
    display: flex; align-items: center;
    padding: 54px 16px 14px;
    gap: 0;
    box-shadow: 0 1px 0 rgba(0,0,0,0.08);
  }

  .close-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 4px; margin-right: 10px;
  }

  .overlay-title {
    font-size: 20px; font-weight: 700; color: #000;
    flex: 1;
  }

  .tab-group {
    display: flex; align-items: center; gap: 0;
  }

  .overlay-tab {
    display: flex; align-items: center; gap: 5px;
    font-size: 14px; font-weight: 400; color: #5D5D5D;
    padding: 4px 10px; cursor: pointer; background: none; border: none;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .tab-divider {
    width: 1px; height: 16px; background: #A8A8A8; margin: 0 2px;
  }

  /* Modal Card */
  .modal-card {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%);
    width: 234px;
    background: #fff;
    border-radius: 20px;
    padding: 22px 18px 20px;
    z-index: 20;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  }

  .modal-nickname {
    font-size: 20px; font-weight: 700; color: #000;
    align-self: flex-start;
  }

  .modal-id {
    font-size: 16px; font-weight: 400; color: #000;
    align-self: flex-start; margin-bottom: 8px;
  }

  .qr-box {
    width: 198px; height: 198px;
    background: #B3B3B3;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
  }

  /* QR code SVG pattern */
  .qr-code {
    width: 136px; height: 136px;
  }
</style>
</head>
