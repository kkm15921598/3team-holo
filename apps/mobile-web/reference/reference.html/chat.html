<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 채팅</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* ── Shared Header ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 54px 20px 12px;
    background: #fff;
    z-index: 30;
  }

  .logo-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 32px; font-weight: 600;
    color: #7448DD; letter-spacing: 1px; line-height: 1;
  }

  .header-icons { display: flex; align-items: center; gap: 16px; }

  .icon-btn {
    position: relative; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #1A1A1A;
  }

  .notif-dot {
    position: absolute; top: 0; right: 0;
    width: 7px; height: 7px;
    background: #FF4343; border-radius: 50%;
    border: 1.5px solid #fff;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 82px;
    background: #fff;
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start;
    padding-top: 10px; z-index: 30;
  }

  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; cursor: pointer;
  }

  .nav-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: #A8A8A8;
  }
  .nav-tab.active .nav-icon { color: #7448DD; }

  .nav-label { font-size: 12px; font-weight: 400; color: #A8A8A8; }
  .nav-tab.active .nav-label { font-weight: 700; color: #7448DD; }

  /* ═══════════════════════════════
     SCREEN A: Chat List
  ═══════════════════════════════ */
  #screenList {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
  }

  .list-body {
    position: absolute;
    top: 110px; bottom: 82px;
    left: 0; right: 0;
    padding: 0 20px;
    overflow-y: auto;
  }
  .list-body::-webkit-scrollbar { display: none; }

  .chat-list-card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 0 8.3px 0 #DED9F8;
    overflow: hidden;
  }

  .chat-item {
    display: flex;
    align-items: center;
    padding: 16px 18px;
    gap: 14px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid #D9D9D9;
  }
  .chat-item:last-child { border-bottom: none; }
  .chat-item:hover { background: #F8F5FF; }

  /* thumbnail types */
  .thumb {
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
  }

  .thumb-grid {
    width: 52px; height: 52px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: #ccc;
    border-radius: 10px;
  }

  .thumb-grid-cell {
    background: #B0A8C8;
  }

  .thumb-single {
    width: 52px; height: 52px;
    background: #C0BBCC;
    border-radius: 10px;
  }

  .chat-info { flex: 1; min-width: 0; }

  .chat-name {
    font-size: 16px; font-weight: 600;
    color: #1A1A1A; line-height: 1.2;
  }

  .chat-sub {
    font-size: 14px; font-weight: 400;
    color: #9A9A9A; margin-top: 3px;
  }

  .chat-chevron {
    flex-shrink: 0; color: #C0C0C0;
  }

  /* ═══════════════════════════════
     SCREEN B: Chat Detail
  ═══════════════════════════════ */
  #screenDetail {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
  }

  .detail-body {
    position: absolute;
    top: 110px; bottom: 82px;
    left: 0; right: 0;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
  }

  /* Chat card container */
  .chat-card {
    flex: 1;
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 0 8.3px 0 #DED9F8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Chat header inside card */
  .chat-header {
    padding: 16px 18px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #D9D9D9;
    flex-shrink: 0;
  }

  .chat-back {
    background: none; border: none; cursor: pointer;
    padding: 2px; flex-shrink: 0;
    display: flex; align-items: center;
  }

  .chat-room-info { flex: 1; }

  .chat-room-name {
    font-size: 17px; font-weight: 700; color: #1A1A1A;
  }

  .chat-room-sub {
    font-size: 13px; font-weight: 400; color: #9A9A9A;
    margin-top: 2px;
  }

  .chat-menu {
    background: none; border: none; cursor: pointer;
    padding: 2px; color: #555;
    display: flex; align-items: center;
  }

  /* Messages area */
  .messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .messages-area::-webkit-scrollbar { display: none; }

  /* Message row */
  .msg-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  .msg-row.mine {
    flex-direction: row-reverse;
  }

  /* Profile */
  .msg-profile {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    flex-shrink: 0;
  }

  .msg-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    overflow: hidden;
    background: #DDD;
  }

  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .msg-nickname {
    font-size: 11px; color: #555; font-weight: 400;
    text-align: center;
  }

  /* Bubble */
  .msg-content { display: flex; flex-direction: column; gap: 4px; max-width: 65%; }

  .msg-row.mine .msg-content { align-items: flex-end; }

  .bubble {
    background: #F0ECF9;
    border-radius: 18px;
    padding: 10px 14px;
    font-size: 15px; font-weight: 400; color: #1A1A1A;
    line-height: 1.4;
    display: inline-block;
    max-width: 100%;
  }

  .msg-row.mine .bubble {
    background: #EBE4F5;
    border-bottom-right-radius: 4px;
  }

  .msg-row:not(.mine) .bubble {
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 11px; color: #ABABAB; font-weight: 400;
    align-self: flex-end;
  }

  .msg-row.mine .msg-time { align-self: flex-end; text-align: right; }

  /* Input bar */
  .input-bar {
    padding: 12px 14px;
    flex-shrink: 0;
  }

  .input-inner {
    display: flex; align-items: center;
    border: 1px solid #D9D9D9;
    border-radius: 20px;
    padding: 10px 14px 10px 18px;
    gap: 8px;
    background: #fff;
  }

  .input-inner input {
    flex: 1; border: none; outline: none;
    font-size: 15px; font-weight: 400;
    color: #1A1A1A; font-family: 'Noto Sans KR', sans-serif;
    background: transparent;
  }

  .input-inner input::placeholder { color: #ABABAB; }

  .send-btn {
    background: none; border: none; cursor: pointer;
    color: #7448DD; display: flex; align-items: center;
    flex-shrink: 0;
  }
</style>
</head>

              <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" fill="#78C8A0"/>
                <ellipse cx="20" cy="18" rx="10" ry="10" fill="#FDDBA0"/>
                <ellipse cx="20" cy="36" rx="14" ry="10" fill="#3A5A78"/>
                <ellipse cx="20" cy="10" rx="9" ry="6" fill="#1A0A00"/>
                <circle cx="16.5" cy="19" r="1.8" fill="#2A1A0A"/>
                <circle cx="23.5" cy="19" r="1.8" fill="#2A1A0A"/>
                <circle cx="17.2" cy="18.3" r="0.7" fill="white"/>
                <circle cx="24.2" cy="18.3" r="0.7" fill="white"/>
                <path d="M17 23 Q20 25.5 23 23" stroke="#C07040" stroke-width="1" fill="none" stroke-linecap="round"/>

      <div class="input-bar">

          <input type="text" id="msgInput" placeholder="댓글 작성하기" onkeydown="sendMsg(event)"/>

    </div>

  <div class="bottom-nav">

</div>

<script>
  function openDetail() {
    document.getElementById('screenList').style.display = 'none';
    const d = document.getElementById('screenDetail');
    d.style.display = 'flex';
  }

  function closeDetail() {
    document.getElementById('screenDetail').style.display = 'none';
    document.getElementById('screenList').style.display = 'flex';
  }

  function sendMsg(e) {
    if (e.key !== 'Enter') return;
    const inp = document.getElementById('msgInput');
    const text = inp.value.trim();
    if (!text) return;

    const area = document.getElementById('msgArea');
    const now = new Date();
    const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

    const row = document.createElement('div');
    row.className = 'msg-row mine';
    row.innerHTML = `
      <div class="msg-content">
        <div class="bubble">${text}</div>
        <span class="msg-time">${time}</span>
      </div>`;
    area.appendChild(row);
    inp.value = '';
    area.scrollTop = area.scrollHeight;
  }
</script>
</body>
</html>
