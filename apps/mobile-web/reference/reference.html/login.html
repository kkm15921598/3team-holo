<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    min-height: 844px;
    margin: 0 auto;
    overflow-x: hidden;
    position: relative;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    height: 44px;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #1A1A1A; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Main Content */
  .content {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 144px; /* 44px status + 144 = 188 from top */
  }

  /* Logo */
  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 50px;
  }

  .logo-symbol {
    width: 132px;
    height: 112px;
  }

  .logo-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 28px;
    font-weight: 600;
    color: #B77CFF;
    letter-spacing: 4px;
    margin-top: 2px;
  }

  /* Input Fields */
  .input-group {
    width: 362px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .input-wrap {
    position: relative;
    width: 362px;
    height: 62px;
  }

  .input-wrap .icon {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: #A8A8A8;
    display: flex;
    align-items: center;
  }

  .input-wrap input {
    width: 100%;
    height: 100%;
    border: 1px solid #A8A8A8;
    border-radius: 15px;
    padding: 0 50px 0 72px;
    font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    color: #1A1A1A;
    background: #fff;
    outline: none;
    transition: border 0.2s;
  }

  .input-wrap input::placeholder {
    color: #A8A8A8;
  }

  .input-wrap input:focus {
    border: 2px solid #7448DD;
  }

  .input-wrap.error input {
    border: 2px solid #FF4343 !important;
  }

  .error-icon {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    background: #FF4343;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .input-wrap.error .error-icon { display: flex; }

  .error-msg {
    font-size: 15px;
    color: #FF1010;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    margin-top: 6px;
    padding-left: 50px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Login Button */
  .login-btn {
    width: 362px;
    height: 60px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(to right, #542BB4, #E95AA4);
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 35px;
    letter-spacing: 0.03em;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.92; }
  .login-btn:active { opacity: 0.85; }

  /* Or divider */
  .or-text {
    font-size: 15px;
    color: #A8A8A8;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    margin-top: 30px;
    margin-bottom: 15px;
  }

  /* Social icons */
  .social-row {
    display: flex;
    gap: 30px;
    align-items: center;
    margin-bottom: 55px;
  }

  .social-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s;
  }
  .social-btn:hover { transform: scale(1.07); }

  .social-google { background: #fff; border: 1px solid #E0E0E0; }
  .social-kakao { background: #FEE500; }
  .social-naver { background: #03C75A; }

  /* Bottom links */
  .bottom-links {
    display: flex;
    align-items: center;
    gap: 0;
    font-size: 15px;
    color: #A8A8A8;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
  }
  .bottom-links span { cursor: pointer; padding: 4px 14px; }
  .bottom-links span:hover { color: #777; }
  .bottom-links .sep {
    color: #A8A8A8;
    cursor: default;
    padding: 0;
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
      <rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/>
      <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/>
      <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/>
      <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A" opacity="0.3"/>
    </svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
      <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/>
      <path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.6C11.7 4.3 10 3.5 8 3.5C6 3.5 4.3 4.3 3 5.6L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="#1A1A1A"/>
      <circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/>
    </svg>
    <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
      <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/>
      <rect x="2" y="2" width="17" height="8" rx="2" fill="#1A1A1A"/>
      <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="#1A1A1A" opacity="0.4"/>
    </svg>
  </div>
</div>

<div class="content">
  <!-- Logo -->
  <div class="logo-wrap">
    <!-- HOLO logo symbol - stylized H with figure-8 loops -->
    <svg class="logo-symbol" width="132" height="112" viewBox="0 0 132 112" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="logoGrad1" x1="0" y1="0" x2="132" y2="112" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#C084FC"/>
          <stop offset="50%" stop-color="#9333EA"/>
          <stop offset="100%" stop-color="#7C3AED"/>
        </linearGradient>
        <linearGradient id="logoGrad2" x1="132" y1="0" x2="0" y2="112" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#A855F7"/>
          <stop offset="100%" stop-color="#6D28D9"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#7C3AED" flood-opacity="0.3"/>
        </filter>
      </defs>

      <!-- Left figure-8 loop -->
      <g filter="url(#shadow)">
        <!-- Top loop left -->
        <path d="M22 22 C22 10 32 4 42 4 C52 4 62 10 62 22 C62 34 52 40 42 40 C52 40 62 46 62 58 C62 70 52 76 42 76 C32 76 22 70 22 58 C22 46 32 40 42 40 C32 40 22 34 22 22 Z" 
          fill="url(#logoGrad1)" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>

        <!-- Right figure-8 loop -->
        <path d="M70 22 C70 10 80 4 90 4 C100 4 110 10 110 22 C110 34 100 40 90 40 C100 40 110 46 110 58 C110 70 100 76 90 76 C80 76 70 70 70 58 C70 46 80 40 90 40 C80 40 70 34 70 22 Z" 
          fill="url(#logoGrad2)" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
      </g>

      <!-- Connecting bridge highlight -->
      <ellipse cx="66" cy="40" rx="6" ry="6" fill="white" opacity="0.6"/>
    </svg>

    <span class="logo-text">HOLO</span>
  </div>

  <!-- Email Input -->
  <div class="input-group">
    <div class="input-wrap" id="emailWrap">
      <div class="icon">
        <svg width="20" height="16" viewBox="0 0 20 16" fill="none">
          <rect x="1" y="1" width="18" height="14" rx="3" stroke="#A8A8A8" stroke-width="1.5"/>
          <path d="M1 4L10 9.5L19 4" stroke="#A8A8A8" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <input type="email" id="emailInput" placeholder="이메일 아이디 입력" autocomplete="off"/>
    </div>

    <!-- Password Input -->
    <div>
      <div class="input-wrap" id="pwWrap">
        <div class="icon">
          <svg width="18" height="22" viewBox="0 0 18 22" fill="none">
            <rect x="1" y="9" width="16" height="12" rx="3" stroke="#A8A8A8" stroke-width="1.5"/>
            <path d="M5 9V6C5 3.8 6.8 2 9 2C11.2 2 13 3.8 13 6V9" stroke="#A8A8A8" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="9" cy="15" r="1.5" fill="#A8A8A8"/>
          </svg>
        </div>
        <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="off"/>
        <div class="error-icon">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M5 2V6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="5" cy="8" r="0.8" fill="white"/>
          </svg>
        </div>
      </div>
      <div class="error-msg" id="errorMsg">비밀번호를 다시 확인해 주세요.</div>
    </div>
  </div>

  <!-- Login Button -->
  <button class="login-btn" onclick="handleLogin()">로그인</button>

  <!-- Or -->
  <span class="or-text">또는</span>

  <!-- Social Login -->
  <div class="social-row">
    <!-- Google -->
    <button class="social-btn social-google">
      <svg width="24" height="24" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    </button>

    <!-- Kakao -->
    <button class="social-btn social-kakao">
      <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 0C5.373 0 0 4.163 0 9.3c0 3.205 2.018 6.025 5.076 7.697L3.96 21.3a.3.3 0 00.455.32l5.79-3.844C10.718 17.923 11.353 18 12 18c6.627 0 12-4.163 12-9.3S18.627 0 12 0z" fill="#3C1E1E"/>
      </svg>
    </button>

    <!-- Naver -->
    <button class="social-btn social-naver">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M11.4 10.2L8.2 5H5v10h3.6V9.8L11.8 15H15V5h-3.6v5.2z" fill="white"/>
      </svg>
    </button>
  </div>

  <!-- Bottom Links -->
  <div class="bottom-links">
    <span>회원가입</span>
    <span class="sep">|</span>
    <span>아이디 찾기</span>
    <span class="sep">|</span>
    <span>비밀번호 찾기</span>
  </div>
</div>

<script>
  const VALID_EMAIL = 'test@naver.com';
  const VALID_PW = 'test12345';

  const emailInput = document.getElementById('emailInput');
  const pwInput = document.getElementById('pwInput');
  const pwWrap = document.getElementById('pwWrap');
  const errorMsg = document.getElementById('errorMsg');

  // Focus styles
  emailInput.addEventListener('focus', () => {
    document.getElementById('emailWrap').querySelector('input').style.borderColor = '';
  });
  pwInput.addEventListener('focus', () => {
    pwWrap.classList.remove('error');
    errorMsg.classList.remove('show');
  });

  function handleLogin() {
    const email = emailInput.value.trim();
    const pw = pwInput.value;

    if (email === VALID_EMAIL && pw === VALID_PW) {
      alert('로그인 성공!');
      pwWrap.classList.remove('error');
      errorMsg.classList.remove('show');
    } else {
      pwWrap.classList.add('error');
      errorMsg.classList.add('show');
    }
  }

  // Enter key support
  pwInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
