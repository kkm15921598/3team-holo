<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 내 친구</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* ── Header ── */
  .header {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 54px 20px 12px;
    background: #fff; z-index: 30;
  }

  .logo-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 32px; font-weight: 600;
    color: #7448DD; letter-spacing: 1px; line-height: 1;
  }

  .header-icons { display: flex; align-items: center; gap: 16px; }

  .icon-btn {
    position: relative; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #1A1A1A;
  }

  .notif-dot {
    position: absolute; top: 0; right: 0;
    width: 7px; height: 7px;
    background: #FF4343; border-radius: 50%;
    border: 1.5px solid #fff;
  }

  /* ── Page Title Bar ── */
  .page-title-bar {
    position: absolute; top: 110px; left: 0; right: 0;
    padding: 0 20px 14px;
    border-bottom: 1px solid #D9D9D9;
    display: flex; align-items: center;
    background: #fff; z-index: 30;
  }

  .back-btn {
    background: none; border: none; cursor: pointer;
    padding: 2px; display: flex; align-items: center;
    margin-right: 8px;
  }

  .page-title { font-size: 20px; font-weight: 700; color: #000; flex: 1; }

  .title-actions { display: flex; align-items: center; gap: 14px; }

  .title-action-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; padding: 2px;
  }

  /* ── Scrollable Body ── */
  .body-content {
    position: absolute;
    top: 158px; bottom: 82px;
    left: 0; right: 0;
    overflow-y: auto;
  }
  .body-content::-webkit-scrollbar { display: none; }

  /* ── Friends Info Row ── */
  .friends-info-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
  }

  .friends-left { display: flex; align-items: center; gap: 6px; }
  .friends-label { font-size: 16px; font-weight: 400; color: #000; }
  .friends-code { font-size: 16px; font-weight: 400; color: #000; }

  /* ── Friend Grid ── */
  .friend-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 0 10px;
  }

  .friend-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 10px;
    cursor: pointer;
  }

  .friend-avatar {
    width: 52px; height: 52px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: #EEE;
  }

  .friend-avatar svg { width: 100%; height: 100%; }

  .friend-name {
    font-size: 14px; font-weight: 400; color: #404040;
    line-height: 1.3;
    word-break: keep-all;
  }

  /* ── More Button ── */
  .more-btn-wrap {
    display: flex; justify-content: center; align-items: center;
    padding: 16px 0 24px;
  }

  .more-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    font-size: 15px; font-weight: 400; color: #555;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* ── Bottom Menus ── */
  .bottom-menus { padding: 0 20px; }

  .menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 0; cursor: pointer;
  }

  .menu-item-text { font-size: 16px; font-weight: 400; color: #000; }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: #fff;
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start;
    padding-top: 10px; z-index: 30;
  }

  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; cursor: pointer;
  }

  .nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #A8A8A8; }
  .nav-tab.active .nav-icon { color: #7448DD; }
  .nav-label { font-size: 12px; font-weight: 400; color: #A8A8A8; }
  .nav-tab.active .nav-label { font-weight: 700; color: #7448DD; }
</style>
</head>

<script>
  function toggleMore(btn) {
    const svg = btn.querySelector('svg');
    const isOpen = btn.dataset.open === 'true';
    btn.dataset.open = !isOpen;
    if (!isOpen) {
      svg.style.transform = 'rotate(180deg)';
      svg.style.transition = 'transform 0.25s';
    } else {
      svg.style.transform = 'rotate(0deg)';
    }
  }
</script>
