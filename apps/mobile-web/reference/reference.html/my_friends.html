<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 내 친구</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* ── Header ── */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 54px 20px 12px;
    background: #fff; z-index: 30;
  }

  .logo-text {
    font-family: 'Fredoka', sans-serif;
    font-size: 32px; font-weight: 600;
    color: #7448DD; letter-spacing: 1px; line-height: 1;
  }

  .header-icons { display: flex; align-items: center; gap: 16px; }

  .icon-btn {
    position: relative; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #1A1A1A;
  }

  .notif-dot {
    position: absolute; top: 0; right: 0;
    width: 7px; height: 7px;
    background: #FF4343; border-radius: 50%;
    border: 1.5px solid #fff;
  }

  /* ── Page Title Bar ── */
  .page-title-bar {
    position: absolute;
    top: 110px; left: 0; right: 0;
    padding: 0 20px 14px;
    border-bottom: 1px solid #D9D9D9;
    display: flex; align-items: center;
    background: #fff; z-index: 30;
  }

  .back-btn {
    background: none; border: none; cursor: pointer;
    padding: 2px; display: flex; align-items: center;
    margin-right: 8px;
  }

  .page-title {
    font-size: 20px; font-weight: 700; color: #000;
    flex: 1;
  }

  .title-actions {
    display: flex; align-items: center; gap: 14px;
  }

  .title-action-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 2px;
  }

  /* ── Body ── */
  .body-content {
    position: absolute;
    top: 158px; bottom: 82px;
    left: 0; right: 0;
    overflow-y: auto;
  }
  .body-content::-webkit-scrollbar { display: none; }

  /* ── Friends Info Row ── */
  .friends-info-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 20px 14px;
  }

  .friends-left {
    display: flex; align-items: center; gap: 6px;
  }

  .friends-label {
    font-size: 16px; font-weight: 400; color: #000;
  }

  .friends-code {
    font-size: 16px; font-weight: 400; color: #000;
  }

  /* ── Empty State ── */
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    padding: 80px 20px 60px;
  }

  .empty-text {
    font-size: 14px; font-weight: 400; color: #979797;
    text-align: center;
  }

  /* ── Bottom Menus ── */
  .bottom-menus {
    padding: 0 20px;
    display: flex; flex-direction: column; gap: 0;
  }

  .menu-item {
    display: flex; align-items: center; gap: 8px;
    padding: 14px 0;
    cursor: pointer;
  }

  .menu-item-text {
    font-size: 16px; font-weight: 400; color: #000;
  }

  /* ── Bottom Nav ── */
  .bottom-nav {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 82px; background: #fff;
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start;
    padding-top: 10px; z-index: 30;
  }

  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; cursor: pointer;
  }

  .nav-icon {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: #A8A8A8;
  }
  .nav-tab.active .nav-icon { color: #7448DD; }
  .nav-label { font-size: 12px; font-weight: 400; color: #A8A8A8; }
  .nav-tab.active .nav-label { font-weight: 700; color: #7448DD; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="logo-text">HOLO</span>
  <div class="header-icons">
    <div class="icon-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="10.5" cy="10.5" r="6.5" stroke="#1A1A1A" stroke-width="2"/>
        <path d="M15.5 15.5L21 21" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="icon-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M6 10C6 7 8.7 4 12 4C15.3 4 18 7 18 10V15L20 17H4L6 15V10Z" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
        <path d="M10 17C10 18.1 10.9 19 12 19C13.1 19 14 18.1 14 17" stroke="#1A1A1A" stroke-width="1.5"/>
      </svg>
      <div class="notif-dot"></div>
    </div>
    <div class="icon-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M15 3L21 9L9 21L3 15L15 3Z" stroke="#1A1A1A" stroke-width="2" stroke-linejoin="round"/>
        <path d="M6 6L7 7M18 14L19 15M3 3L4 4M20 20L21 21M14 6L15 5" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<!-- Page Title -->
<div class="page-title-bar">
  <button class="back-btn">
    <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
      <path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <span class="page-title">내 친구</span>
  <div class="title-actions">
    <!-- Plus icon -->
    <button class="title-action-btn">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 4V18M4 11H18" stroke="#A8A8A8" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
    <!-- Vertical dots -->
    <button class="title-action-btn">
      <svg width="4" height="18" viewBox="0 0 4 18" fill="none">
        <circle cx="2" cy="2" r="2" fill="#555"/>
        <circle cx="2" cy="9" r="2" fill="#555"/>
        <circle cx="2" cy="16" r="2" fill="#555"/>
      </svg>
    </button>
  </div>
</div>

<!-- Body -->
<div class="body-content">

  <!-- Friends Info Row -->
  <div class="friends-info-row">
    <div class="friends-left">
      <!-- Friends list icon -->
      <svg width="20" height="18" viewBox="0 0 20 18" fill="none">
        <circle cx="7" cy="6" r="3.5" stroke="#1A1A1A" stroke-width="1.5"/>
        <circle cx="14" cy="5" r="2.8" stroke="#1A1A1A" stroke-width="1.5"/>
        <path d="M1 16C1 12.7 3.7 10 7 10C10.3 10 13 12.7 13 16" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M14 10C16.8 10 19 12.2 19 15" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="friends-label">친구목록</span>
    </div>
    <span class="friends-code">내 코드 : ajhd5</span>
  </div>

  <!-- Empty State -->
  <div class="empty-state">
    <span class="empty-text">친구를 추가 해보세요</span>
  </div>

  <!-- Bottom Menus -->
  <div class="bottom-menus">
    <div class="menu-item">
      <!-- Block icon -->
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="9" stroke="#1A1A1A" stroke-width="1.6"/>
        <line x1="4" y1="4" x2="18" y2="18" stroke="#1A1A1A" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="menu-item-text">차단한 친구</span>
    </div>
    <div class="menu-item">
      <!-- Report/bell icon -->
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M5 9C5 6 7.7 3 11 3C14.3 3 17 6 17 9V14L19 16H3L5 14V9Z" stroke="#1A1A1A" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M9 16C9 17.1 9.9 18 11 18C12.1 18 13 17.1 13 16" stroke="#1A1A1A" stroke-width="1.4"/>
        <circle cx="16" cy="4" r="3" fill="#FF4343"/>
      </svg>
      <span class="menu-item-text">신고하기</span>
    </div>
  </div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-tab">
    <div class="nav-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M5 12.5L14 4L23 12.5V23H17V17H11V23H5V12.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg></div>
    <span class="nav-label">홈</span>
  </div>
  <div class="nav-tab">
    <div class="nav-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="4" y="6" width="20" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M4 10H24" stroke="currentColor" stroke-width="1.5"/><path d="M8 14H16M8 18H13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></div>
    <span class="nav-label">지도</span>
  </div>
  <div class="nav-tab">
    <div class="nav-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect x="5" y="4" width="18" height="20" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M9 10H19M9 14H19M9 18H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="nav-label">게시판</span>
  </div>
  <div class="nav-tab">
    <div class="nav-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M5 6H23V19C23 19.6 22.6 20 22 20H9L5 24V6Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M10 12H18M10 16H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div>
    <span class="nav-label">채팅</span>
  </div>
  <div class="nav-tab active">
    <div class="nav-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="10" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M6 24C6 20.1 9.6 17 14 17C18.4 17 22 20.1 22 24" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></div>
    <span class="nav-label">마이</span>
  </div>
</div>

</body>
</html>
