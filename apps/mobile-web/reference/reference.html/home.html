<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 홈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* ── Header ── */
  .header {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 54px 20px 12px;
    background: #fff; z-index: 10;
  }

  .logo {
    font-family: 'Fredoka', sans-serif;
    font-size: 32px; font-weight: 600;
    color: #B77CFF; letter-spacing: 1px; line-height: 1;
  }

  .hdr-icons { display: flex; align-items: center; gap: 16px; }

  .icon-btn {
    position: relative; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #1A1A1A;
  }

  .notif-dot {
    position: absolute; top: 0; right: 0;
    width: 7px; height: 7px; background: #FF4343;
    border-radius: 50%; border: 1.5px solid #fff;
  }

  /* ── Scrollable body ── */
  .body {
    position: absolute;
    top: 110px; bottom: 82px;
    left: 0; right: 0;
    overflow-y: auto;
  }
  .body::-webkit-scrollbar { display: none; }

  /* ── Main Visual Box ── */
  .main-card {
    width: 362px;
    margin: 0 auto;
    height: 447px;
    background: linear-gradient(180deg, #DDC0FF 0%, #EDE0FF 40%, #F5F0FF 70%, #fff 100%);
    border-radius: 0 0 40px 40px;
    position: relative;
    overflow: visible;
  }

  /* Stars decoration */
  .star {
    position: absolute;
    color: #B077EE;
    font-size: 20px;
    opacity: 0.7;
    pointer-events: none;
  }

  /* 3D Room in card */
  .room-wrap {
    position: absolute;
    top: 10px; left: 0; right: 0;
    display: flex; justify-content: center;
  }

  /* Speech bubble */
  .speech-bubble {
    position: absolute;
    top: 148px; right: 42px;
    background: #fff;
    border-radius: 12px 12px 12px 4px;
    padding: 8px 14px;
    font-size: 15px; font-weight: 600; color: #1A1A1A;
    box-shadow: 0 2px 10px rgba(116,72,221,0.15);
    white-space: nowrap;
    z-index: 5;
  }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -8px; left: 12px;
    border: 5px solid transparent;
    border-top-color: #fff;
    border-bottom: none;
  }

  /* ── Profile Card ── */
  .profile-card {
    width: 319px;
    height: 88px;
    background: #FAFAFA;
    border-radius: 20px;
    position: absolute;
    bottom: -44px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center;
    padding: 0 16px;
    gap: 14px;
    box-shadow: 0 4px 16px rgba(116,72,221,0.1);
    z-index: 6;
  }

  .p-avatar-wrap {
    position: relative; flex-shrink: 0;
    width: 63px; height: 63px;
  }

  .p-avatar {
    width: 63px; height: 63px; border-radius: 50%;
    overflow: hidden;
  }

  .lv-badge {
    position: absolute;
    bottom: -8px; left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(to right, #542BB4, #E95AA4);
    color: #fff; font-size: 12px; font-weight: 700;
    padding: 3px 9px; border-radius: 4px;
    white-space: nowrap;
  }

  .p-info { flex: 1; min-width: 0; }

  .p-name-row {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px;
  }

  .p-name { font-size: 20px; font-weight: 700; color: #1A1A1A; }

  .p-badge {
    width: 27px; height: 27px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .p-title { font-size: 15px; font-weight: 400; color: #A9A9A9; }

  /* ── Recommend Section ── */
  .recommend-section {
    margin-top: 68px;
    padding: 0 14px;
  }

  .rec-hint {
    font-size: 15px; font-weight: 400; color: #8E8E8E;
    margin-bottom: 3px;
  }

  .rec-title {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 14px;
    font-size: 18px;
  }

  .rec-title .user-name { font-weight: 700; color: #7448DD; }
  .rec-title .mid-text { font-weight: 500; color: #000; }
  .rec-title .highlight { font-weight: 700; color: #7448DD; }

  .refresh-btn {
    background: none; border: none; cursor: pointer;
    color: #7448DD; display: flex; align-items: center;
    padding: 2px;
  }

  /* ── Cards Row ── */
  .cards-row {
    display: flex; gap: 12px;
    overflow-x: auto; overflow-y: visible;
    padding-right: 0;
  }
  .cards-row::-webkit-scrollbar { display: none; }

  .moim-card {
    width: 169px; height: 153px;
    min-width: 169px;
    background: #EBE4F5;
    border-radius: 10px;
    padding: 15px 14px 13px;
    position: relative; flex-shrink: 0;
  }
  .moim-card:last-child { margin-right: 14px; }

  .card-title { font-size: 16px; font-weight: 700; color: #1A1A1A; }
  .card-meta { font-size: 12px; font-weight: 500; color: #7448DD; margin-top: 3px; opacity: 0.8; }
  .card-desc {
    font-size: 13px; color: #333; margin-top: 8px;
    max-width: 94px; max-height: 40px;
    overflow: hidden; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  .card-arrow {
    position: absolute; top: 13px; right: 13px;
    width: 33px; height: 33px; border-radius: 50%;
    background: #CCBCE0;
    display: flex; align-items: center; justify-content: center;
  }

  .card-avatars {
    position: absolute; bottom: 13px; left: 14px;
    display: flex;
  }

  .av {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid #EBE4F5; margin-left: -6px;
    overflow: hidden; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    background: #ddd;
  }
  .av:first-child { margin-left: 0; }

  /* ── FAB ── */
  .fab {
    position: absolute;
    bottom: 103px; right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #542BB4, #E95AA4);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6.9px rgba(84,43,180,0.5);
    cursor: pointer; z-index: 20;
    transition: transform 0.15s;
  }
  .fab:hover { transform: scale(1.08); }

  /* ── Bottom Nav ── */
  .bot-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 82px; background: #fff;
    border-top: 1px solid #F0F0F0;
    display: flex; align-items: flex-start;
    padding-top: 10px; z-index: 10;
  }

  .nav-tab {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 3px; cursor: pointer;
  }

  .nav-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #A8A8A8; }
  .nav-tab.active .nav-icon { color: #7448DD; }
  .nav-label { font-size: 12px; font-weight: 400; color: #A8A8A8; }
  .nav-tab.active .nav-label { font-weight: 700; color: #7448DD; }
</style>
</head>
