<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390px, initial-scale=1.0">
<title>HOLO - 닉네임 설정</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    width: 390px;
    height: 844px;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
  }

  /* Status Bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 24px 0;
    height: 44px;
  }
  .status-time { font-size: 15px; font-weight: 600; color: #1A1A1A; }
  .status-icons { display: flex; gap: 6px; align-items: center; }

  /* Back Button */
  .back-btn {
    position: absolute;
    top: 83px;
    left: 20px;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: none; border: none; padding: 0;
  }

  /* Progress Bar */
  .progress-wrap {
    position: absolute;
    top: 127px;
    left: 0;
    width: 390px;
    height: 5px;
    background: #E2E2E2;
  }
  .progress-fill {
    width: 120px;
    height: 5px;
    background: linear-gradient(to right, #542BB4, #E95AA4);
  }

  /* Main Content */
  .content {
    position: absolute;
    top: 167px;
    left: 0; right: 0;
    padding: 0 20px;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    color: #1A1A1A;
    line-height: 1.45;
    margin-bottom: 15px;
  }

  .subtitle {
    font-size: 15px;
    font-weight: 400;
    color: #A8A8A8;
    margin-bottom: 45px;
  }

  /* Input */
  .input-wrap {
    position: relative;
    width: 362px;
    height: 62px;
  }

  .input-wrap input {
    width: 100%;
    height: 100%;
    border: 1px solid #A8A8A8;
    border-radius: 15px;
    padding: 0 52px 0 22px;
    font-size: 18px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 400;
    color: #1A1A1A;
    background: #fff;
    outline: none;
    transition: border-color 0.2s, color 0.2s;
  }

  .input-wrap input::placeholder { color: #A8A8A8; }

  /* Focus */
  .input-wrap.focused input {
    border: 2px solid #7448DD;
  }

  /* Success */
  .input-wrap.success input {
    border: 2px solid #7448DD;
    color: #7448DD;
  }

  /* Error */
  .input-wrap.error input {
    border: 2px solid #FF4343;
    color: #1A1A1A;
  }

  /* Right Icon */
  .right-icon {
    position: absolute;
    right: 22px;
    top: 50%;
    transform: translateY(-50%);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .input-wrap.success .right-icon.check { display: flex; }
  .input-wrap.error .right-icon.warn { display: flex; }

  /* Error Message */
  .error-msg {
    font-size: 15px;
    color: #FF4343;
    font-weight: 400;
    margin-top: 10px;
    padding-left: 43px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* Bottom Fixed */
  .bottom-fixed {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .hint-text {
    font-size: 15px;
    color: #A8A8A8;
    font-weight: 400;
    text-align: center;
  }

  .next-btn {
    width: 362px;
    height: 60px;
    border-radius: 30px;
    border: none;
    background: #A8A8A8;
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: default;
    letter-spacing: 0.03em;
    transition: background 0.25s;
  }
  .next-btn.active {
    background: #000000;
    cursor: pointer;
  }

  /* iOS Keyboard overlay */
  .keyboard-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: #D1D5DB;
    border-top: 1px solid #B0B5BB;
    display: none;
    flex-direction: column;
    gap: 0;
    padding: 10px 4px 6px;
  }
  .keyboard-overlay.show { display: flex; }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 9px;
  }

  .kb-key {
    background: #fff;
    border-radius: 5px;
    height: 42px;
    min-width: 32px;
    flex: 1;
    max-width: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: #1A1A1A;
    font-family: 'Noto Sans KR', sans-serif;
    box-shadow: 0 1px 0 rgba(0,0,0,0.35);
    cursor: pointer;
    user-select: none;
  }
  .kb-key:active { background: #ACB3BB; }

  .kb-key.wide { min-width: 42px; max-width: 48px; font-size: 14px; color: #444; background: #ADB5BD; }
  .kb-key.action { background: #ADB5BD; }
  .kb-key.space { flex: 3; max-width: 180px; font-size: 14px; color: #444; }
  .kb-key.blue { background: #007AFF; color: #fff; font-size: 15px; font-weight: 600; }
  .kb-key.num-row { max-width: 32px; }
</style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
      <rect x="0" y="3" width="3" height="9" rx="1" fill="#1A1A1A"/>
      <rect x="4.5" y="2" width="3" height="10" rx="1" fill="#1A1A1A"/>
      <rect x="9" y="0.5" width="3" height="11.5" rx="1" fill="#1A1A1A"/>
      <rect x="13.5" y="0" width="3" height="12" rx="1" fill="#1A1A1A" opacity="0.3"/>
    </svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
      <path d="M8 2.5C10.2 2.5 12.2 3.4 13.6 4.9L15 3.5C13.2 1.6 10.7 0.5 8 0.5C5.3 0.5 2.8 1.6 1 3.5L2.4 4.9C3.8 3.4 5.8 2.5 8 2.5Z" fill="#1A1A1A"/>
      <path d="M8 5.5C9.4 5.5 10.7 6.1 11.6 7L13 5.6C11.7 4.3 10 3.5 8 3.5C6 3.5 4.3 4.3 3 5.6L4.4 7C5.3 6.1 6.6 5.5 8 5.5Z" fill="#1A1A1A"/>
      <circle cx="8" cy="10" r="1.5" fill="#1A1A1A"/>
    </svg>
    <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
      <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#1A1A1A" stroke-opacity="0.35"/>
      <rect x="2" y="2" width="17" height="8" rx="2" fill="#1A1A1A"/>
      <path d="M23 4.5V7.5C23.8 7.2 24.5 6.5 24.5 6C24.5 5.5 23.8 4.8 23 4.5Z" fill="#1A1A1A" opacity="0.4"/>
    </svg>
  </div>
</div>

<!-- Back -->
<button class="back-btn" onclick="history.back()">
  <svg width="10" height="18" viewBox="0 0 10 18" fill="none">
    <path d="M9 1L1 9L9 17" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-fill"></div>
</div>

<!-- Content -->
<div class="content">
  <div class="title">HOLO에서 사용할<br>당신의 이름을 정해주세요!</div>
  <div class="subtitle">한글 최대 10자 / 공백, 특수문자 불가</div>

  <div class="input-wrap" id="inputWrap">
    <input type="text" id="nicknameInput" placeholder="닉네임을 입력해 주세요"
      onfocus="onFocus()" onblur="onBlur()" oninput="onInput()"/>

    <!-- Check Icon (success) -->
    <div class="right-icon check">
      <svg width="20" height="15" viewBox="0 0 20 15" fill="none">
        <path d="M1 7L7.5 13.5L19 1" stroke="#7448DD" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Warn Icon (error) -->
    <div class="right-icon warn">
      <div style="width:18px;height:18px;background:#FF4343;border-radius:50%;display:flex;align-items:center;justify-content:center;">
        <svg width="3" height="10" viewBox="0 0 3 10" fill="none">
          <path d="M1.5 1V6" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="1.5" cy="8.5" r="0.8" fill="white"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="error-msg" id="errorMsg">닉네임을 다시 확인해 주세요.</div>
</div>

<!-- Bottom -->
<div class="bottom-fixed" id="bottomFixed">
  <span class="hint-text">나중에 다시 수정할 수 있어요!</span>
  <button class="next-btn" id="nextBtn" onclick="handleNext()">다음</button>
</div>

<!-- iOS Keyboard -->
<div class="keyboard-overlay" id="keyboard">
  <!-- Number row -->
  <div class="kb-row">
    <div class="kb-key num-row">1</div><div class="kb-key num-row">2</div>
    <div class="kb-key num-row">3</div><div class="kb-key num-row">4</div>
    <div class="kb-key num-row">5</div><div class="kb-key num-row">6</div>
    <div class="kb-key num-row">7</div><div class="kb-key num-row">8</div>
    <div class="kb-key num-row">9</div><div class="kb-key num-row">0</div>
  </div>
  <!-- Row 1 -->
  <div class="kb-row">
    <div class="kb-key" onclick="typeChar('ㅂ')">ㅂ</div>
    <div class="kb-key" onclick="typeChar('ㅈ')">ㅈ</div>
    <div class="kb-key" onclick="typeChar('ㄷ')">ㄷ</div>
    <div class="kb-key" onclick="typeChar('ㄱ')">ㄱ</div>
    <div class="kb-key" onclick="typeChar('ㅅ')">ㅅ</div>
    <div class="kb-key" onclick="typeChar('ㅛ')">ㅛ</div>
    <div class="kb-key" onclick="typeChar('ㅕ')">ㅕ</div>
    <div class="kb-key" onclick="typeChar('ㅑ')">ㅑ</div>
    <div class="kb-key" onclick="typeChar('ㅐ')">ㅐ</div>
    <div class="kb-key" onclick="typeChar('ㅔ')">ㅔ</div>
  </div>
  <!-- Row 2 -->
  <div class="kb-row">
    <div class="kb-key" onclick="typeChar('ㅁ')">ㅁ</div>
    <div class="kb-key" onclick="typeChar('ㄴ')">ㄴ</div>
    <div class="kb-key" onclick="typeChar('ㅇ')">ㅇ</div>
    <div class="kb-key" onclick="typeChar('ㄹ')">ㄹ</div>
    <div class="kb-key" onclick="typeChar('ㅎ')">ㅎ</div>
    <div class="kb-key" onclick="typeChar('ㅗ')">ㅗ</div>
    <div class="kb-key" onclick="typeChar('ㅓ')">ㅓ</div>
    <div class="kb-key" onclick="typeChar('ㅏ')">ㅏ</div>
    <div class="kb-key" onclick="typeChar('ㅣ')">ㅣ</div>
  </div>
  <!-- Row 3 -->
  <div class="kb-row">
    <div class="kb-key wide action">⇧</div>
    <div class="kb-key" onclick="typeChar('ㅋ')">ㅋ</div>
    <div class="kb-key" onclick="typeChar('ㅌ')">ㅌ</div>
    <div class="kb-key" onclick="typeChar('ㅊ')">ㅊ</div>
    <div class="kb-key" onclick="typeChar('ㅍ')">ㅍ</div>
    <div class="kb-key" onclick="typeChar('ㅠ')">ㅠ</div>
    <div class="kb-key" onclick="typeChar('ㅜ')">ㅜ</div>
    <div class="kb-key" onclick="typeChar('ㅡ')">ㅡ</div>
    <div class="kb-key wide action" onclick="deleteLast()">⌫</div>
  </div>
  <!-- Row 4 -->
  <div class="kb-row">
    <div class="kb-key wide action">!#1</div>
    <div class="kb-key wide action" style="font-size:12px">한/영</div>
    <div class="kb-key" onclick="typeChar(' ')">　</div>
    <div class="kb-key space" onclick="typeChar(' ')">한국어</div>
    <div class="kb-key" onclick="typeChar('.')">.</div>
    <div class="kb-key blue" onclick="closeKeyboard()">이동</div>
  </div>
</div>

<script>
  const input = document.getElementById('nicknameInput');
  const wrap = document.getElementById('inputWrap');
  const errMsg = document.getElementById('errorMsg');
  const nextBtn = document.getElementById('nextBtn');
  const keyboard = document.getElementById('keyboard');
  const bottomFixed = document.getElementById('bottomFixed');

  // Validate: Korean only, max 10, no space, no special chars
  function validate(val) {
    if (!val) return 'empty';
    if (/[\s]/.test(val) || /[^가-힣ㄱ-ㅎㅏ-ㅣ]/.test(val)) return 'error';
    if (val.length > 10) return 'error';
    return 'success';
  }

  function onFocus() {
    keyboard.classList.add('show');
    bottomFixed.style.display = 'none';
    const v = validate(input.value);
    if (v === 'empty') {
      wrap.className = 'input-wrap focused';
    }
  }

  function onBlur() {
    // handled by closeKeyboard
  }

  function onInput() {
    const val = input.value;
    const v = validate(val);
    if (v === 'empty') {
      wrap.className = 'input-wrap focused';
      errMsg.classList.remove('show');
      nextBtn.classList.remove('active');
    } else if (v === 'success') {
      wrap.className = 'input-wrap success';
      errMsg.classList.remove('show');
      nextBtn.classList.add('active');
    } else {
      wrap.className = 'input-wrap error';
      errMsg.classList.add('show');
      nextBtn.classList.remove('active');
    }
  }

  function typeChar(ch) {
    if (ch === ' ') return; // block spaces
    if (input.value.length >= 10 && validate(input.value) === 'success') return;
    input.value += ch;
    onInput();
  }

  function deleteLast() {
    input.value = input.value.slice(0, -1);
    onInput();
  }

  function closeKeyboard() {
    keyboard.classList.remove('show');
    bottomFixed.style.display = 'flex';
    const v = validate(input.value);
    if (v === 'empty') wrap.className = 'input-wrap';
  }

  function handleNext() {
    if (nextBtn.classList.contains('active')) {
      alert('다음 단계로 이동합니다!');
    }
  }
</script>
</body>
</html>
